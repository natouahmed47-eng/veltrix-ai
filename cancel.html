<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Not Completed — Veltrix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
    <div class="top-bar">
        <div class="logo">Veltrix<span>AI</span></div>
        <div class="tagline">Product Decision Engine</div>
    </div>
    <div class="status-page">
        <div class="status-icon">🔙</div>
        <h1 class="status-title">Payment was not completed</h1>
        <p class="status-message">
            No charges were made to your account.<br />
            You can try again whenever you're ready — no pressure.
        </p>
        <div class="status-next-steps">
            <a class="status-btn" href="/#pricingSection">Try Again</a>
            <a class="status-btn status-btn-outline" href="/">Return to Home</a>
        </div>
    </div>
    <script>
    /* ── Conversion Tracking ── */
    /* ── Session ID for attribution ── */
    (function() {
        var key = "veltrix_session_id";
        var tsKey = "veltrix_session_ts";
        var MAX_AGE_MS = 24 * 60 * 60 * 1000;
        var existing = localStorage.getItem(key);
        var ts = parseInt(localStorage.getItem(tsKey) || "0", 10);
        if (!existing || (Date.now() - ts) > MAX_AGE_MS) {
            var sid = Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
            localStorage.setItem(key, sid);
            localStorage.setItem(tsKey, String(Date.now()));
        }
    })();

    window.trackEvent = window.trackEvent || function(name, data) {
        var payload = Object.assign(
            { event: name, timestamp: new Date().toISOString(), session_id: localStorage.getItem("veltrix_session_id") || "" },
            data || {}
        );
        try {
            var headers = { "Content-Type": "application/json" };
            var token = localStorage.getItem("veltrix_token");
            if (token) headers["Authorization"] = "Bearer " + token;
            fetch("/api/track-event", {
                method: "POST",
                headers: headers,
                body: JSON.stringify(payload)
            }).catch(function() {});
        } catch(e) {}
    };
    window.trackEvent("payment_cancel_page_view", {
        plan: "pro",
        source: "pricing"
    });
    </script>
</body>
</html>
