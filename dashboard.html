<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard — Veltrix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: var(--v-font, 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
            background: var(--v-bg, #f8fafc);
            margin: 0;
            padding: 0;
            color: var(--v-text-secondary, #334155);
            font-size: var(--v-text-base, 0.875rem);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .top-bar {
            background: var(--v-bg-elevated, #fff);
            border-bottom: 1px solid var(--v-border-light, #f1f5f9);
            padding: 0 var(--v-sp-10, 2.5rem);
            height: 60px;
            display: flex;
            align-items: center;
            gap: var(--v-sp-3, 0.75rem);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .top-bar .logo { font-size: var(--v-text-2xl, 1.25rem); font-weight: 700; color: var(--v-text, #0f172a); letter-spacing: -0.5px; text-decoration: none; }
        .top-bar .logo span { color: var(--v-brand, #4338ca); font-weight: 600; }
        .top-bar .tagline { font-size: 11px; color: var(--v-text-faint, #94a3b8); margin-left: 2px; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; }
        .nav-links { margin-left: auto; display: flex; align-items: center; gap: var(--v-sp-3, 0.75rem); }
        .nav-links a { color: var(--v-text-faint, #94a3b8); font-size: var(--v-text-base, 0.875rem); font-weight: 500; text-decoration: none; transition: color 150ms; }
        .nav-links a:hover { color: var(--v-text, #0f172a); }
        .nav-links a.active { color: var(--v-brand, #4338ca); font-weight: 600; }
        .nav-links button {
            padding: 6px 14px; border-radius: var(--v-radius, 8px); border: 1px solid var(--v-border, #e2e8f0);
            background: var(--v-bg-elevated, #fff); color: var(--v-text-muted, #64748b); font-size: var(--v-text-xs, 0.75rem); font-weight: 500;
            cursor: pointer; font-family: inherit; transition: border-color 150ms, color 150ms;
        }
        .nav-links button:hover { border-color: #cbd5e1; color: var(--v-text-secondary, #334155); }
        .container { max-width: 840px; margin: 0 auto; padding: var(--v-sp-12, 3rem) var(--v-sp-6, 1.5rem) var(--v-sp-16, 4rem); }
        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: var(--v-sp-6, 1.5rem);
        }
        .page-header h1 { margin: 0; font-size: var(--v-text-3xl, 1.5rem); font-weight: 700; color: var(--v-text, #0f172a); letter-spacing: -0.5px; }
        .usage-badge {
            padding: 5px 14px; border-radius: var(--v-radius-full, 9999px); font-size: var(--v-text-sm, 0.8125rem); font-weight: 500;
            background: var(--v-bg, #f8fafc); color: var(--v-text-muted, #64748b); border: 1px solid var(--v-border-light, #f1f5f9);
        }
        /* ── Billing Card ── */
        .billing-card {
            background: var(--v-bg-elevated, #fff); border-radius: var(--v-radius-xl, 18px); padding: 0;
            margin-bottom: var(--v-sp-6, 1.5rem); border: 1px solid var(--v-border-light, #f1f5f9);
            box-shadow: var(--v-shadow, 0 2px 8px rgba(0,0,0,0.04));
            overflow: hidden;
        }
        .billing-header {
            padding: 28px 32px 24px;
            display: flex; align-items: center; gap: 16px;
            border-bottom: 1px solid var(--v-border-light, #f8fafc);
        }
        .billing-icon { font-size: 28px; flex-shrink: 0; }
        .billing-title-wrap { flex: 1; }
        .billing-plan-name { font-size: var(--v-text-xl, 1.125rem); font-weight: 700; color: var(--v-text, #0f172a); display: flex; align-items: center; gap: 10px; }
        .billing-subtitle { font-size: var(--v-text-sm, 0.8125rem); color: var(--v-text-faint, #94a3b8); margin-top: 3px; }

        .plan-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 10px; border-radius: var(--v-radius-sm, 6px);
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .plan-badge.active { background: var(--v-success-light, #ecfdf5); color: #166534; }
        .plan-badge.cancelled { background: var(--v-warning-light, #fffbeb); color: #92400e; }
        .plan-badge.suspended { background: var(--v-warning-light, #fffbeb); color: #92400e; }
        .plan-badge.expired { background: var(--v-danger-light, #fef2f2); color: #991b1b; }
        .plan-badge.free { background: var(--v-bg, #f8fafc); color: var(--v-text-muted, #64748b); }

        /* Status message bar */
        .billing-status-msg {
            padding: 14px 32px; font-size: var(--v-text-base, 0.875rem); line-height: 1.6;
            display: flex; align-items: center; gap: 10px;
        }
        .billing-status-msg.msg-active { background: #f0fdf4; color: #166534; }
        .billing-status-msg.msg-cancelled { background: var(--v-warning-light, #fffbeb); color: #92400e; }
        .billing-status-msg.msg-suspended { background: #fff7ed; color: #9a3412; }
        .billing-status-msg.msg-expired { background: var(--v-danger-light, #fef2f2); color: #991b1b; }
        .billing-status-msg.msg-free { background: var(--v-bg, #f8fafc); color: var(--v-text-muted, #64748b); }
        .billing-status-icon { font-size: 18px; flex-shrink: 0; }

        /* Feature comparison */
        .billing-body { padding: 24px 32px 28px; }
        .feature-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
            margin-bottom: 24px;
        }
        .feature-col h4 {
            font-size: 11px; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.08em; color: var(--v-text-faint, #94a3b8); margin: 0 0 14px;
        }
        .feature-col.col-pro h4 { color: var(--v-brand, #4338ca); }
        .feature-item {
            display: flex; align-items: center; gap: 8px;
            font-size: var(--v-text-base, 0.875rem); color: var(--v-text-muted, #475569); margin-bottom: 10px;
        }
        .feature-check { color: #10b981; font-weight: 700; font-size: var(--v-text-md, 0.9375rem); flex-shrink: 0; }
        .feature-x { color: var(--v-border, #e2e8f0); font-weight: 700; font-size: var(--v-text-md, 0.9375rem); flex-shrink: 0; }

        /* CTA button */
        .billing-actions { padding: 0 32px 28px; }
        .btn-billing {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 11px 26px; border-radius: var(--v-radius-md, 10px); border: none;
            font-size: var(--v-text-base, 0.875rem); font-weight: 600; cursor: pointer;
            font-family: inherit; text-decoration: none;
            transition: background 150ms, box-shadow 150ms, transform 0.1s;
        }
        .btn-billing:hover { transform: translateY(-1px); }
        .btn-billing:active { transform: translateY(0); }
        .btn-billing-primary {
            background: var(--v-brand, #4338ca); color: #fff;
        }
        .btn-billing-primary:hover { background: var(--v-brand-hover, #3730a3); box-shadow: 0 4px 14px rgba(67,56,202,0.18); }
        .btn-billing-outline {
            background: var(--v-bg-elevated, #fff); color: var(--v-brand, #4338ca);
            border: 1px solid var(--v-brand-border, #c7d2fe);
        }
        .btn-billing-outline:hover { background: var(--v-brand-light, #eef2ff); }
        .btn-billing-warning {
            background: #f59e0b; color: #fff;
        }
        .btn-billing-warning:hover { background: #d97706; box-shadow: 0 4px 14px rgba(245,158,11,0.2); }
        .btn-billing + .btn-billing { margin-left: 10px; }
        @media (max-width: 640px) {
            .top-bar { padding: 0 16px; height: auto; min-height: 52px; padding-top: 12px; padding-bottom: 12px; flex-wrap: wrap; }
            .nav-links { gap: 10px; width: 100%; justify-content: flex-end; }
            .billing-header { padding: 20px 24px 16px; }
            .billing-status-msg { padding: 14px 24px; }
            .billing-body { padding: 20px 24px 24px; }
            .billing-actions { padding: 0 24px 24px; }
            .feature-grid { grid-template-columns: 1fr; gap: 20px; }
            .analysis-card { padding: 20px 20px; }
        }
        .empty-state {
            text-align: center; padding: 80px 24px; color: var(--v-text-faint, #94a3b8);
        }
        .empty-state .icon { font-size: 40px; margin-bottom: 16px; }
        .empty-state h3 { margin: 0 0 8px; color: var(--v-text-secondary, #334155); font-size: var(--v-text-xl, 1.125rem); font-weight: 700; }
        .empty-state p { margin: 0; font-size: var(--v-text-md, 0.9375rem); line-height: 1.6; }
        .empty-state a { color: var(--v-brand, #4338ca); font-weight: 600; text-decoration: none; }
        .analysis-card {
            background: var(--v-bg-elevated, #fff); border-radius: var(--v-radius-lg, 14px); padding: 22px 28px;
            margin-bottom: 12px; border: 1px solid var(--v-border-light, #f1f5f9);
            box-shadow: var(--v-shadow-sm, 0 1px 3px rgba(0,0,0,0.04));
            cursor: pointer; transition: box-shadow 0.2s, transform 0.15s;
        }
        .analysis-card:hover { box-shadow: var(--v-shadow-md, 0 4px 16px rgba(0,0,0,0.06)); transform: translateY(-1px); }
        .analysis-card .ac-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .analysis-card .ac-title { font-size: var(--v-text-lg, 1rem); font-weight: 700; color: var(--v-text, #0f172a); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .analysis-card .ac-date { font-size: var(--v-text-xs, 0.75rem); color: var(--v-text-faint, #94a3b8); flex-shrink: 0; }
        .analysis-card .ac-summary { font-size: var(--v-text-base, 0.875rem); color: var(--v-text-muted, #64748b); line-height: 1.65; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .badge-sm {
            display: inline-flex; padding: 3px 10px; border-radius: var(--v-radius-sm, 6px);
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.04em; color: #fff;
        }
        .login-prompt {
            text-align: center; padding: 80px 24px;
        }
        .login-prompt h2 { margin: 0 0 12px; font-size: var(--v-text-2xl, 1.25rem); color: var(--v-text, #0f172a); font-weight: 700; letter-spacing: -0.3px; }
        .login-prompt p { margin: 0 0 24px; color: var(--v-text-faint, #94a3b8); font-size: var(--v-text-md, 0.9375rem); }
        .login-prompt button {
            padding: 12px 32px; border-radius: var(--v-radius-md, 10px); border: none;
            font-size: var(--v-text-md, 0.9375rem); font-weight: 600; background: var(--v-brand, #4338ca);
            color: #fff; cursor: pointer; font-family: inherit;
            transition: background 150ms, box-shadow 150ms;
        }
        .login-prompt button:hover { background: var(--v-brand-hover, #3730a3); box-shadow: 0 4px 14px rgba(67,56,202,0.18); }

        /* Detail modal */
        .detail-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15,23,42,0.35); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            z-index: 1000; justify-content: center; align-items: flex-start;
            overflow-y: auto; padding: 48px 24px;
        }
        .detail-panel {
            background: var(--v-bg-elevated, #fff); border-radius: var(--v-radius-xl, 18px); padding: 40px 36px; max-width: 840px; width: 100%;
            position: relative;
            box-shadow: var(--v-shadow-xl, 0 20px 48px rgba(0,0,0,0.10));
        }
        .detail-close {
            position: absolute; top: 16px; right: 20px; border: none; background: none;
            font-size: 22px; cursor: pointer; color: #cbd5e1; transition: color 150ms;
        }
        .detail-close:hover { color: var(--v-text-muted, #64748b); }
        @media (max-width: 640px) {
            .container { padding: 32px 16px 48px; }
            .page-header { flex-direction: column; align-items: flex-start; gap: 10px; }
        }
        /* ── CTA Pulse Animation ── */
        @keyframes ctaPulse {
            0% { box-shadow: 0 0 0 0 rgba(67, 56, 202, 0.35); }
            70% { box-shadow: 0 0 0 10px rgba(67, 56, 202, 0); }
            100% { box-shadow: 0 0 0 0 rgba(67, 56, 202, 0); }
        }
        .cta-pulse { animation: ctaPulse 2s ease-in-out infinite; }
        /* ── Loss Aversion Block ── */
        .billing-lost-features {
            padding: 0 32px 20px; font-size: var(--v-text-sm, 0.8125rem);
        }
        .billing-lost-title {
            font-weight: 700; margin-bottom: 6px; color: inherit;
        }
        .billing-lost-item {
            display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
        }
        .billing-lost-x { color: var(--v-danger, #dc2626); font-weight: 700; flex-shrink: 0; }
        /* ── Progress Bar ── */
        .billing-progress-wrap { padding: 0 32px 20px; text-align: center; }
        .usage-progress-bar {
            width: 100%; max-width: 280px; height: 5px;
            background: var(--v-border-light, #f1f5f9); border-radius: 3px;
            margin: 0 auto 6px; overflow: hidden;
        }
        .usage-progress-fill {
            height: 100%; border-radius: 3px;
            background: var(--v-brand, #4338ca); transition: width 0.4s ease;
        }
        .usage-progress-fill.progress-warn { background: var(--v-warning, #f59e0b); }
        .usage-progress-fill.progress-critical { background: var(--v-danger, #dc2626); }
        .usage-progress-label { font-size: var(--v-text-xs, 0.75rem); color: var(--v-text-faint, #94a3b8); }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="/" class="logo">Veltrix<span>AI</span></a>
        <div class="tagline">Product Decision Engine</div>
        <div class="nav-links">
            <a href="/app">Decide</a>
            <a href="/dashboard" class="active">Dashboard</a>
            <span style="color:#334155;font-size:13px;font-weight:600;" id="navUsername"></span>
            <button id="logoutBtn">Log Out</button>
        </div>
    </div>

    <div class="container">
        <div id="loginPrompt" class="login-prompt" style="display:none;">
            <h2>Log in to view your dashboard</h2>
            <p>Save and review your product decisions in one place.</p>
            <button onclick="window.location.href='/login'">Log In</button>
        </div>
        <div id="dashboardContent" style="display:none;">
            <div id="billingCard" class="billing-card" style="display:none;"></div>
            <div class="page-header">
                <h1>Your Decisions</h1>
                <span class="usage-badge" id="usageBadge"></span>
            </div>
            <div id="analysisList"></div>
        </div>
    </div>

    <!-- Detail overlay -->
    <div class="detail-overlay" id="detailOverlay">
        <div class="detail-panel">
            <button class="detail-close" id="detailClose">&times;</button>
            <div id="detailContent"></div>
        </div>
    </div>

    <script src="/upsell.js"></script>
    <script>
    /* ── Session ID for attribution ── */
    (function() {
        var key = "veltrix_session_id";
        var tsKey = "veltrix_session_ts";
        var MAX_AGE_MS = 24 * 60 * 60 * 1000;
        var existing = localStorage.getItem(key);
        var ts = parseInt(localStorage.getItem(tsKey) || "0", 10);
        if (!existing || (Date.now() - ts) > MAX_AGE_MS) {
            var sid = Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
            localStorage.setItem(key, sid);
            localStorage.setItem(tsKey, String(Date.now()));
        }
    })();

    /* Lightweight trackEvent for dashboard — fire-and-forget to backend */
    window.trackEvent = function(name, data) {
        var payload = Object.assign(
            { event: name, timestamp: new Date().toISOString(), session_id: localStorage.getItem("veltrix_session_id") || "" },
            data || {}
        );
        try {
            var headers = { "Content-Type": "application/json" };
            var token = localStorage.getItem("veltrix_token");
            if (token) headers["Authorization"] = "Bearer " + token;
            fetch("/api/track-event", {
                method: "POST",
                headers: headers,
                body: JSON.stringify(payload)
            }).catch(function() {});
        } catch(e) {}
    };

    /* ── A/B Experiment: upsell_v1 ── */
    (function() {
        var v = localStorage.getItem("upsell_variant");
        if (!v) { v = Math.random() < 0.5 ? "A" : "B"; localStorage.setItem("upsell_variant", v); }
        window._upsellVariant = v;
    })();
    </script>
    <script>
    (function () {
        var token = localStorage.getItem("veltrix_token") || "";
        var username = localStorage.getItem("veltrix_username") || "";

        if (!token || !username) {
            document.getElementById("loginPrompt").style.display = "block";
            document.querySelector(".nav-links").style.display = "none";
            return;
        }

        document.getElementById("navUsername").textContent = username;
        document.getElementById("dashboardContent").style.display = "block";

        document.getElementById("logoutBtn").addEventListener("click", function () {
            localStorage.removeItem("veltrix_token");
            localStorage.removeItem("veltrix_username");
            window.location.href = "/login";
        });

        var badgeColors = {
            fragrance: "#d97706", electronics: "#2563eb", fashion: "#db2777",
            beauty: "#9333ea", home: "#059669", general: "#64748b"
        };

        function esc(str) {
            if (!str) return "";
            var div = document.createElement("div");
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        function formatDate(iso) {
            var d = new Date(iso);
            return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
        }

        var allAnalyses = [];

        /* ── Fetch plan / subscription status ── */
        fetch("/api/me", { headers: { "Authorization": "Bearer " + token } })
            .then(function (r) { return r.json(); })
            .then(function (d) {
                if (d.error) return;
                var card = document.getElementById("billingCard");
                var ctx = window.getUserStateContext ? window.getUserStateContext(d) : null;
                if (!ctx) return;

                /* ── State config — simplified: 1 main message + 1 supporting line ── */
                var cfg = {};
                var pulseCls = ctx.pulseCta ? " cta-pulse" : "";

                /* Build progress bar HTML for free users */
                function buildProgressBarHtml(ctx) {
                    if (ctx.state !== "free" || !ctx.analysisLimit) return "";
                    var pct = Math.min(Math.round((ctx.analysisCount / ctx.analysisLimit) * 100), 100);
                    var barCls = pct >= 100 ? "progress-critical" : (pct >= 80 ? "progress-warn" : "");
                    return '<div class="billing-progress-wrap">' +
                        '<div class="usage-progress-bar"><div class="usage-progress-fill ' + barCls + '" style="width:' + pct + '%"></div></div>' +
                        '<span class="usage-progress-label">' + ctx.analysisCount + ' / ' + ctx.analysisLimit + ' verdicts used</span>' +
                        '</div>';
                }

                if (ctx.state === "pro_active") {
                    cfg = {
                        planName: "Veltrix Pro",
                        icon: "⚡",
                        badgeCls: "active",
                        badgeLabel: "Active",
                        subtitle: ctx.supportingLine || "Unlimited analyses · All Pro features enabled",
                        msgCls: "msg-active",
                        msgIcon: "✅",
                        msgText: ctx.message,
                        extraHtml: "",
                        btnHtml: (function() {
                            var html = '';
                            if (ctx.ctaHref) {
                                html += '<a href="' + esc(ctx.ctaHref) + '" target="_blank" rel="noopener" class="btn-billing btn-billing-outline" onclick="if(window.trackEvent)window.trackEvent(\'cta_primary_click\',{user_state:\'pro_active\',action:\'manage\',variant:window._upsellVariant,source:\'dashboard\'})">' + esc(ctx.cta) + ' ↗</a>';
                            }
                            return html;
                        })()
                    };
                } else if (ctx.state === "cancelled") {
                    cfg = {
                        planName: "Free Plan",
                        icon: "📦",
                        badgeCls: "cancelled",
                        badgeLabel: "Cancelled",
                        subtitle: ctx.supportingLine || "Don\u2019t lose your data access",
                        msgCls: "msg-cancelled",
                        msgIcon: "⚠️",
                        msgText: ctx.message,
                        extraHtml: buildLostFeaturesHtml(ctx.lostFeatures),
                        btnHtml: '<a href="/#pricingSection" class="btn-billing btn-billing-primary' + pulseCls + '" onclick="if(window.trackEvent)window.trackEvent(\'cta_primary_click\',{user_state:\'cancelled\',action:\'keep_pro\',variant:window._upsellVariant,source:\'dashboard\'})">' + esc(ctx.cta) + '</a>'
                    };
                } else if (ctx.state === "suspended") {
                    cfg = {
                        planName: "Free Plan",
                        icon: "📦",
                        badgeCls: "suspended",
                        badgeLabel: "Suspended",
                        subtitle: ctx.supportingLine || "Update payment to restore Pro access",
                        msgCls: "msg-suspended",
                        msgIcon: "🚨",
                        msgText: ctx.message,
                        extraHtml: "",
                        btnHtml: '<a href="' + esc(ctx.ctaHref) + '" target="_blank" rel="noopener" class="btn-billing btn-billing-primary" onclick="if(window.trackEvent)window.trackEvent(\'cta_primary_click\',{user_state:\'suspended\',action:\'fix_payment\',variant:window._upsellVariant,source:\'dashboard\'})">' + esc(ctx.cta) + ' ↗</a>' +
                                 '<a href="/#pricingSection" class="btn-billing btn-billing-outline" onclick="if(window.trackEvent)window.trackEvent(\'retention_click\',{user_state:\'suspended\',action:\'resubscribe\',source:\'dashboard\'})">' + esc(ctx.secondaryCta) + '</a>'
                    };
                } else if (ctx.state === "expired") {
                    cfg = {
                        planName: "Free Plan",
                        icon: "📦",
                        badgeCls: "expired",
                        badgeLabel: "Expired",
                        subtitle: ctx.supportingLine || "Restore access to unlimited analyses",
                        msgCls: "msg-expired",
                        msgIcon: "⏰",
                        msgText: ctx.message,
                        extraHtml: buildLostFeaturesHtml(ctx.lostFeatures),
                        btnHtml: '<a href="/#pricingSection" class="btn-billing btn-billing-primary' + pulseCls + '" onclick="if(window.trackEvent)window.trackEvent(\'cta_primary_click\',{user_state:\'expired\',action:\'restore_pro\',variant:window._upsellVariant,source:\'dashboard\'})">' + esc(ctx.cta) + '</a>'
                    };
                } else {
                    /* free user — simplified message */
                    cfg = {
                        planName: "Free Plan",
                        icon: "📦",
                        badgeCls: "free",
                        badgeLabel: "Free",
                        subtitle: ctx.supportingLine || "Upgrade for unlimited access",
                        msgCls: ctx.atLimit ? "msg-expired" : (ctx.nearLimit ? "msg-cancelled" : "msg-free"),
                        msgIcon: ctx.atLimit ? "🚫" : (ctx.nearLimit ? "⚠️" : "💡"),
                        msgText: ctx.message,
                        extraHtml: buildProgressBarHtml(ctx),
                        btnHtml: '<a href="/#pricingSection" class="btn-billing btn-billing-primary' + pulseCls + '" onclick="if(window.trackEvent)window.trackEvent(\'cta_primary_click\',{user_state:\'free\',action:\'upgrade\',variant:window._upsellVariant,source:\'dashboard\'})">' + esc(ctx.cta) + '</a>'
                    };
                }

                /* Build lost features HTML block */
                function buildLostFeaturesHtml(features) {
                    if (!features || !features.length) return "";
                    var html = '<div class="billing-lost-features"><div class="billing-lost-title">You\u2019ll lose access to:</div>';
                    for (var i = 0; i < features.length; i++) {
                        html += '<div class="billing-lost-item"><span class="billing-lost-x">\u2717</span><span>' + esc(features[i]) + '</span></div>';
                    }
                    html += '</div>';
                    return html;
                }

                /* Track upsell/retention view on dashboard */
                if (window.trackEvent) {
                    window.trackEvent("upsell_view", {
                        user_state: ctx.state,
                        source: "dashboard"
                    });
                }
                /* Track retention view for cancelled/expired */
                if ((ctx.state === "cancelled" || ctx.state === "expired") && window.trackEvent) {
                    window.trackEvent("retention_view", {
                        user_state: ctx.state,
                        source: "dashboard"
                    });
                }
                /* Track urgency view for cancelled */
                if (ctx.state === "cancelled" && window.trackEvent) {
                    window.trackEvent("urgency_view", {
                        user_state: ctx.state,
                        source: "dashboard"
                    });
                }
                /* Track limit reached for free users at limit */
                if (ctx.atLimit && window.trackEvent) {
                    window.trackEvent("limit_reached", {
                        user_state: ctx.state,
                        analysis_count: ctx.analysisCount,
                        analysis_limit: ctx.analysisLimit,
                        source: "dashboard"
                    });
                }

                /* ── Feature comparison ── */
                var proOnlyFeatures = [
                    "Category-specific verdicts",
                    "Unlimited decisions",
                    "Priority support"
                ];
                var freeFeatures = [
                    "Basic product verdicts",
                    (d.analysis_limit || 0) + " decisions total",
                    "Standard decision model"
                ];
                var proFeatures = [
                    "Full decision reports"
                ].concat(proOnlyFeatures).concat(["Full export capabilities"]);

                function featureList(items, check) {
                    return items.map(function(f) {
                        return '<div class="feature-item">' +
                            '<span class="' + (check ? 'feature-check' : 'feature-x') + '">' + (check ? '✓' : '—') + '</span>' +
                            '<span>' + esc(f) + '</span></div>';
                    }).join("");
                }

                card.innerHTML =
                    /* Header */
                    '<div class="billing-header">' +
                        '<div class="billing-icon">' + cfg.icon + '</div>' +
                        '<div class="billing-title-wrap">' +
                            '<div class="billing-plan-name">' + esc(cfg.planName) +
                                ' <span class="plan-badge ' + cfg.badgeCls + '">' + cfg.badgeLabel + '</span>' +
                            '</div>' +
                            '<div class="billing-subtitle">' + esc(cfg.subtitle) + '</div>' +
                        '</div>' +
                    '</div>' +
                    /* Status message */
                    '<div class="billing-status-msg ' + cfg.msgCls + '">' +
                        '<span class="billing-status-icon">' + cfg.msgIcon + '</span>' +
                        '<span>' + esc(cfg.msgText) + '</span>' +
                    '</div>' +
                    /* Extra content (loss aversion / progress bar) */
                    cfg.extraHtml +
                    /* Feature comparison */
                    '<div class="billing-body">' +
                        '<div class="feature-grid">' +
                            '<div class="feature-col">' +
                                '<h4>Free</h4>' +
                                featureList(freeFeatures, true) +
                                featureList(proOnlyFeatures, false) +
                            '</div>' +
                            '<div class="feature-col col-pro">' +
                                '<h4>Pro</h4>' +
                                featureList(proFeatures, true) +
                            '</div>' +
                        '</div>' +
                    '</div>' +
                    /* CTA */
                    (cfg.btnHtml ? '<div class="billing-actions">' + cfg.btnHtml + '</div>' : '');

                card.style.display = "block";
            })
            .catch(function () { /* ignore */ });

        fetch("/api/my-analyses", { headers: { "Authorization": "Bearer " + token } })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (data.error) {
                    document.getElementById("dashboardContent").style.display = "none";
                    document.getElementById("loginPrompt").style.display = "block";
                    return;
                }

                document.getElementById("usageBadge").textContent = data.count + " / " + data.limit + " verdicts used";

                var list = document.getElementById("analysisList");
                allAnalyses = data.analyses;

                if (!allAnalyses.length) {
                    list.innerHTML =
                        '<div class="empty-state">' +
                            '<div class="icon">📊</div>' +
                            '<h3>No decisions yet</h3>' +
                            '<p>Go to the <a href="/app">workspace</a> to get your first product verdict.</p>' +
                        '</div>';
                    return;
                }

                list.innerHTML = allAnalyses.map(function (a, idx) {
                    var bg = badgeColors[a.category] || badgeColors.general;
                    return (
                        '<div class="analysis-card" data-idx="' + idx + '">' +
                            '<div class="ac-top">' +
                                '<span class="badge-sm" style="background:' + bg + ';">' + esc(a.category || "general") + '</span>' +
                                '<span class="ac-title">' + esc(a.title || a.idea) + '</span>' +
                                '<span class="ac-date">' + formatDate(a.created_at) + '</span>' +
                            '</div>' +
                            (a.short_summary ? '<div class="ac-summary">' + esc(a.short_summary) + '</div>' : '') +
                        '</div>'
                    );
                }).join("");
            })
            .catch(function () {
                document.getElementById("analysisList").innerHTML = '<div class="empty-state"><p>Failed to load decisions.</p></div>';
            });

        /* Detail view */
        var overlay = document.getElementById("detailOverlay");

        document.getElementById("analysisList").addEventListener("click", function (e) {
            var card = e.target.closest(".analysis-card");
            if (!card) return;
            var idx = parseInt(card.getAttribute("data-idx"), 10);
            var analysis = allAnalyses[idx];
            if (!analysis) return;

            var content = document.getElementById("detailContent");
            content.innerHTML =
                '<h2 style="margin:0 0 8px;font-size:20px;font-weight:700;">' + esc(analysis.title || analysis.idea) + '</h2>' +
                '<span class="badge-sm" style="background:' + (badgeColors[analysis.category] || "#64748b") + ';margin-bottom:12px;display:inline-block;">' + esc(analysis.category || "general") + '</span>' +
                '<span style="color:#94a3b8;font-size:12px;margin-left:10px;">' + formatDate(analysis.created_at) + '</span>' +
                (analysis.short_summary ? '<p style="color:#475569;font-size:14px;line-height:1.7;margin:16px 0 0;">' + esc(analysis.short_summary) + '</p>' : '') +
                '<p style="color:#64748b;font-size:13px;margin:12px 0 0;"><strong>Original query:</strong> ' + esc(analysis.idea) + '</p>';
            overlay.style.display = "flex";
        });

        document.getElementById("detailClose").addEventListener("click", function () { overlay.style.display = "none"; });
        overlay.addEventListener("click", function (e) { if (e.target === overlay) overlay.style.display = "none"; });
    })();
    </script>
</body>
</html>
