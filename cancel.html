<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Not Completed — Veltrix AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
    <div class="top-bar">
        <div class="logo">Veltrix<span>AI</span></div>
        <div class="tagline">Product Intelligence Platform</div>
    </div>
    <div class="status-page">
        <div class="status-icon">🔙</div>
        <h1 class="status-title">Payment was not completed</h1>
        <p class="status-message">
            No charges were made to your account.<br />
            You can try again whenever you're ready — no pressure.
        </p>
        <div class="status-next-steps">
            <a class="status-btn" href="/">Try Again</a>
            <a class="status-btn status-btn-outline" href="/">Return to Home</a>
        </div>
    </div>
    <script>
    /* ── Conversion Tracking ── */
    window.trackEvent = window.trackEvent || function(name, data) {
        var payload = Object.assign(
            { event: name, timestamp: new Date().toISOString() },
            data || {}
        );
        console.log("[TRACK]", name, payload);
    };
    window.trackEvent("payment_cancel_page_view", {
        plan: "pro",
        source: "pricing"
    });
    </script>
</body>
</html>
